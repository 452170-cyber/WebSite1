<!DOCTYPE html>
<html>
<body>

<h2>Report a problem!</h2> 

<form action="/action_page.php">
  <label for="fname">First/last name:</label><br>
  <input type="text" id="fname" name="fname" style="border-radius: 15px; padding: 8px; width: 250px;"><br>
  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email" style="border-radius: 15px; padding: 8px; width: 250px;"><br><br>
  <label for="issue">Your issue/question:</label><br>
  <textarea id="issue" name="issue" rows="6" style="border-radius: 15px; padding: 8px; width: 350px;"></textarea><br><br>
  <input type="submit" value="Submit" style="border-radius: 15px; padding: 8px 20px;">
</form> 

<p>If you click the "Submit" button, we will get back to you regarding your issue/question via email</p>
